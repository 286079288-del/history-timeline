<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>近代历史人物图谱</title>

<style>
body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #0b0f19; color: #e0e0e0; overflow: hidden; }
#app { display: flex; flex-direction: column; height: 100vh; }
#header { height: 44px; display: flex; align-items: center; padding: 0 16px; background: #141b2d; border-bottom: 1px solid #2a3a5c; gap: 12px; }
.logo { font-size: 16px; font-weight: 700; color: #f0c040; }
#mainContainer { flex: 1; overflow-x: auto; overflow-y: hidden; position: relative; }
.dual-flex { display: flex; flex-direction: column; }
.timeline-block { flex: 1; min-height: 120px; position: relative; border-bottom: 1px solid #2a3a5c; }
.block-header { height: 32px; display: flex; align-items: center; padding: 0 12px; background: rgba(11,15,25,0.95); border-bottom: 1px solid #2a3a5c; gap: 8px; position: sticky; left: 0; z-index: 20; backdrop-filter: blur(6px); }
.block-title { font-size: 13px; font-weight: 600; color: #f0c040; }
.btn-collapse { background: none; border: 1px solid #2a3a5c; color: #888; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; }
.btn-collapse:hover { color: #f0c040; border-color: #f0c040; }
.timeline-canvas { position: relative; height: calc(100% - 32px); overflow: hidden; }
.dynasty-band { position: absolute; top: 0; bottom: 0; opacity: 0.08; }
.dynasty-label { position: absolute; top: 50%; transform: translate(-50%,-50%); font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.18); white-space: nowrap; pointer-events: none; text-shadow: 0 2px 8px rgba(0,0,0,0.8); letter-spacing: 0.12em; }
.axis-line { position: absolute; left: 0; width: 100%; border-top: 1px solid rgba(255,255,255,0.15); z-index: 2; pointer-events: none; }
.tick-mark { position: absolute; z-index: 2; pointer-events: none; }
.tick-line { width: 1px; background: rgba(255,255,255,0.1); }
.tick-label { font-size: 9px; color: rgba(255,255,255,0.15); transform: translateX(-50%); white-space: nowrap; }
.event-node { position: absolute; z-index: 5; cursor: help; }
.event-dot { width: 8px; height: 8px; border-radius: 50%; border: 2px solid; margin: 0 auto; background: rgba(11,15,25,0.8); }
.event-line { width: 1px; margin: 0 auto; }
.event-label { font-size: 10px; color: rgba(255,255,255,0.4); text-align: center; white-space: nowrap; max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
.event-label:hover { color: #fff; }
.person-row { position: absolute; display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 11px; white-space: nowrap; z-index: 10; padding: 1px 4px; border-radius: 3px; transition: background 0.15s; }
.person-row:hover { background: rgba(240,192,64,0.12); }
.person-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.person-name { max-width: 120px; overflow: hidden; text-overflow: ellipsis; color: rgba(255,255,255,0.7); }
.person-row:hover .person-name { color: #f0c040; }
.person-emoji { font-size: 12px; }
.timeline-canvas { position: relative; overflow: visible; }
.events-above, .events-below { position: absolute; left: 0; width: 100%; pointer-events: none; }
.persons-above, .persons-below { position: absolute; left: 0; width: 100%; }
</style>
</head>
<body>
<div id="app">
  <header id="header" style="height:40px;padding:0 12px;">

          <div class="persons-above" id="worldPerA"></div>
          <div class="persons-below" id="worldPerB"></div>

      </div>
    </div>
  </main>
</div>

  { id: 'daoguang', name: '道光帝', birth: 1782, death: 1850, cat: 'emperor', dynasty: '清', emoji: '👑', desc: '清朝第八位皇帝。在位期间发生鸦片战争，签订《南京条约》，中国开始沦为半殖民地。是一位想有作为却无力回天的悲情皇帝。', achievements: ['禁烟', '鸦片战争'], relations: [], events: ['e_opium_war'] },
  { id: 'xianfeng', name: '咸丰帝', birth: 1831, death: 1861, cat: 'emperor', dynasty: '清', emoji: '👑', desc: '清朝第九位皇帝。太平天国起义席卷半壁江山，英法联军攻入北京火烧圆明园。被迫签订《北京条约》，崩于热河避暑山庄。', achievements: [], relations: [], events: ['e_second_opium'] },
  { id: 'hong_xiuquan', name: '洪秀全', birth: 1814, death: 1864, cat: 'sage', dynasty: '清', emoji: '✝️', desc: '太平天国运动领袖。自称耶稣之弟，建立太平天国定都天京（南京）。历时14年，波及18省，是中国历史上最大规模的农民起义。', achievements: ['建立太平天国', '天朝田亩制度'], relations: [], events: ['e_taiping'] },

  { id: 'li_hongzhang', name: '李鸿章', birth: 1823, death: 1901, cat: 'politician', dynasty: '清', emoji: '🎩', desc: '晚清权臣，洋务运动领袖。创办北洋水师和江南制造局，签订《马关条约》《辛丑条约》。背负卖国骂名的爱国者，被誉"东方俾斯麦"。', achievements: ['北洋水师', '洋务运动', '江南制造局'], relations: [], events: ['e_sino_japanese', 'e_boxer'] },

  { id: 'yuan_shikai', name: '袁世凯', birth: 1859, death: 1916, cat: 'politician', dynasty: '清', emoji: '👑', desc: '北洋军阀首领。小站练兵创建北洋新军，逼清帝退位窃取辛亥革命果实。1915年称帝，83天后在全民声讨中被迫取消，不久忧惧而死。', achievements: ['北洋新军', '逼清帝退位', '洪宪称帝'], relations: [], events: ['e_xinhai'] },
  { id: 'tan_sitong', name: '谭嗣同', birth: 1865, death: 1898, cat: 'scholar', dynasty: '清', emoji: '✊', desc: '戊戌六君子之首。变法失败后拒绝逃亡："各国变法无不从流血而成，今中国未闻有因变法而流血者，有之请自嗣同始。"在菜市口慷慨就义，年仅33岁。', achievements: ['戊戌六君子', '为变法献身'], relations: [], events: ['e_hundred_days'] },

  { id: 'ding_ruchang', name: '丁汝昌', birth: 1836, death: 1895, cat: 'general', dynasty: '清', emoji: '⛵', desc: '北洋水师提督。甲午海战中率舰队与日本海军决战，威海卫被困后拒绝投降，服毒自尽殉国。是中国近代海军史上最悲壮的人物之一。', achievements: ['北洋水师提督', '殉国'], relations: [], events: ['e_sino_japanese'] },
  { id: 'puyi', name: '溥仪（宣统帝）', birth: 1906, death: 1967, cat: 'emperor', dynasty: '清', emoji: '👑', desc: '清朝末代皇帝。3岁即位，6岁退位。后在日本扶植下成为伪满洲国傀儡皇帝。战后被苏联俘虏，引渡回国后在抚顺战犯管理所改造，成为新中国公民。著有《我的前半生》。', achievements: ['末代皇帝', '伪满洲国傀儡', '《我的前半生》'], relations: [], events: ['e_xinhai'] },

  { id: 'lu_xun', name: '鲁迅', birth: 1881, death: 1936, cat: 'artist', dynasty: '民国', emoji: '✍️', desc: '中国现代文学奠基人。以笔为刀解剖国民劣根性，《狂人日记》《阿Q正传》《呐喊》深刻影响了中国现代思想。毛泽东评价"鲁迅的骨头是最硬的"。', achievements: ['《狂人日记》', '《阿Q正传》', '中国现代文学之父'], relations: [], events: [] },
  { id: 'hu_shi', name: '胡适', birth: 1891, death: 1962, cat: 'scholar', dynasty: '民国', emoji: '🎓', desc: '新文化运动领袖。提倡白话文，主张"大胆假设，小心求证"。曾任北大校长、驻美大使，是20世纪中国最具影响力的自由主义知识分子。', achievements: ['白话文运动', '新文化运动'], relations: [], events: [] },

  // === 民国/抗战 ===

  { id: 'peng_dehuai', name: '彭德怀', birth: 1898, death: 1974, cat: 'general', dynasty: '新中国', emoji: '⚔️', desc: '十大元帅之一。指挥百团大战，抗美援朝率志愿军击败美军。1959年庐山会议上书批评大跃进，遭错误批判。晚年被囚禁迫害致死，1978年平反。', achievements: ['百团大战', '抗美援朝', '敢言直谏'], relations: [], events: ['e_korean_war'] },

const YS = 1800, YE = 2026, PPY = 4;
let pxPerYear = PPY;
const CAT_COLORS = { emperor:'#e74c3c', military:'#e67e22', scholar:'#3498db', philosopher:'#9b59b6', scientist:'#2ecc71', artist:'#f39c12', politician:'#1abc9c', sage:'#f1c40f', diplomat:'#ff6b6b', general:'#e67e22', inventor:'#00b894' };

const ERA_GROUPS = [
  { name:'晚清', start:1800, end:1912, color:'#2c3e50' },
  { name:'民国/二战', start:1912, end:1949, color:'#3498db' },
  { name:'当代', start:1949, end:2026, color:'#e74c3c' },
];

// ===== 工具函数 =====
function x(year) { return (year - YS) * pxPerYear; }
function totalWidth() { return (YE - YS) * pxPerYear + 200; }

// ===== 数据加载 =====


// ===== 渲染函数 =====
function renderBlock(idPrefix, data, events, eras) {
  const canvas = document.getElementById(idPrefix + 'Canvas');
  if (!canvas) return;
  const w = totalWidth();
  canvas.style.width = w + 'px';
  const axisTop = canvas.clientHeight * 0.5;

  // Bands
  const bandsEl = document.getElementById(idPrefix + 'Bands');
  if (bandsEl && eras) {
    bandsEl.innerHTML = '';
    eras.forEach(era => {
      const x1 = x(era.start), x2 = x(era.end);
      const b = document.createElement('div');
      b.className = 'dynasty-band';
      b.style.cssText = `left:${x1}px;width:${Math.max(x2-x1,2)}px;background:${era.color};`;
      bandsEl.appendChild(b);
      if (x2 - x1 > 40) {
        const l = document.createElement('div');
        l.className = 'dynasty-label';
        l.style.cssText = `left:${x1+(x2-x1)/2}px;`;
        l.textContent = era.name;
        bandsEl.appendChild(l);
      }
    });
  }

  // Axis
  const axisEl = document.getElementById(idPrefix + 'Axis');
  if (axisEl) axisEl.style.cssText = `top:${axisTop}px;left:0;width:${w}px;`;
  const axisLine = axisTop;

  // Ticks
  const ticksEl = document.getElementById(idPrefix + 'Ticks');
  if (ticksEl) {
    ticksEl.innerHTML = '';
    const ms = pxPerYear < 1 ? 100 : pxPerYear < 3 ? 50 : 25;
    for (let y = Math.ceil(YS/ms)*ms; y <= YE; y += ms) {
      const isMajor = y % (ms*5) === 0;
      const px = x(y);
      const t = document.createElement('div');
      t.className = 'tick-mark';
      t.style.cssText = `left:${px}px;top:${axisLine - (isMajor?8:4)}px;`;
      const ln = document.createElement('div');
      ln.className = 'tick-line';
      ln.style.height = (isMajor?16:8) + 'px';
      t.appendChild(ln);
      if (isMajor) {
        const lb = document.createElement('div');
        lb.className = 'tick-label';
        lb.textContent = '' + y;
        t.appendChild(lb);
      }
      ticksEl.appendChild(t);
    }
  }

  // Events
  const evtA = document.getElementById(idPrefix + 'EvtA');
  const evtB = document.getElementById(idPrefix + 'EvtB');
  if (evtA) { evtA.innerHTML = ''; evtA.style.top = '0'; }
  if (evtB) { evtB.innerHTML = ''; evtB.style.top = axisLine + 'px'; }
  if (events) {
    events.forEach((ev, i) => {
      const px = x(ev.year);
      const above = i % 2 === 0;
      const c = above ? evtA : evtB;
      if (!c) return;
      const colors = { war:'#e74c3c', politics:'#3498db', culture:'#f39c12', economy:'#2ecc71', science:'#9b59b6' };
      const col = colors[ev.type] || '#888';
      const n = document.createElement('div');
      n.className = 'event-node ' + (above ? 'above' : 'below');
      n.style.cssText = `left:${px}px;${above?'bottom:0;':'top:0;'}`;
      n.innerHTML = `<div class="event-dot" style="border-color:${col}"></div><div class="event-line" style="height:${20+(i%5)*8}px;background:${col}"></div><div class="event-label">${ev.name}</div>`;
      c.appendChild(n);
    });
  }

  // Persons
  const perA = document.getElementById(idPrefix + 'PerA');
  const perB = document.getElementById(idPrefix + 'PerB');
  if (perA) { perA.innerHTML = ''; perA.style.top = '0'; }
  if (perB) { perB.innerHTML = ''; perB.style.top = axisLine + 'px'; }
  if (data) {
    const sorted = [...data].sort((a,b) => a.birth - b.birth);
    // 分组
    const groupA = sorted.filter((_,i) => i % 2 === 0);
    const groupB = sorted.filter((_,i) => i % 2 !== 0);
    [groupA, groupB].forEach((grp, idx) => {
      const container = idx === 0 ? perA : perB;
      if (!container) return;
      const rowH = 28;
      grp.forEach((p, i) => {
        const px = x(p.birth);
        const top = axisLine + (idx === 0 ? -(i+1)*rowH : 10 + i*rowH);
        if (top < 0) return; // above viewport
        const col = CAT_COLORS[p.cat] || '#888';
        const row = document.createElement('div');
        row.className = 'person-row';
        row.style.cssText = `left:${px}px;top:${(idx===0?top-18:top)}px;`;
        row.innerHTML = `<span class="person-emoji">${p.emoji||'👤'}</span><span class="person-name" style="border-left:2px solid ${col};padding-left:3px">${p.name}</span>`;
        row.title = `${p.name} (${p.birth}-${p.death})\n${p.desc}`;
        container.appendChild(row);
      });
    });
    // Wrapper height
    const maxRows = Math.ceil(data.length / 2) + 2;
    const h = axisLine + maxRows * rowH + 40 + 'px';
    canvas.style.minHeight = h;
  }
}

function initTimelines() {
  if (typeof PERSONS === 'undefined') { console.error('Data not loaded'); return; }

  // 设置容器宽度
  const w = totalWidth();
  document.getElementById('mainContainer').style.width = Math.max(w, window.innerWidth) + 'px';

  renderBlock('china', PERSONS, EVENTS, ERA_GROUPS);
  renderBlock('japan', JAPAN_PERSONS, JAPAN_EVENTS, [
    { name:'江户末', start:1800, end:1868, color:'#2a2a5a' },
    { name:'明治', start:1868, end:1912, color:'#c0392b' },
    { name:'大正', start:1912, end:1926, color:'#8e44ad' },
    { name:'昭和', start:1926, end:1989, color:'#2980b9' },
    { name:'平成/令和', start:1989, end:2026, color:'#27ae60' },
  ]);
  renderBlock('world', WORLD_PERSONS, WORLD_EVENTS, [
    { name:'拿破仑', start:1800, end:1815, color:'#8B0000' },
    { name:'殖民帝国', start:1815, end:1918, color:'#2c3e50' },
    { name:'战间期', start:1918, end:1939, color:'#7f8c8d' },
    { name:'冷战', start:1947, end:1991, color:'#34495e' },
    { name:'后冷战', start:1991, end:2026, color:'#2980b9' },
  ]);
}

// 折叠按钮
document.addEventListener('click', (e) => {
  const btn = e.target.closest('.btn-collapse');
  if (!btn) return;
  const block = btn.closest('.timeline-block');
  block.classList.toggle('collapsed');
  if (block.classList.contains('collapsed')) {
    btn.textContent = '▼';
  } else {
    btn.textContent = '▲';
  }
});

// 拖拽滚动
(function() {
  const mc = document.getElementById('mainContainer');
  let isDown = false, startX, scrollLeft;
  mc.addEventListener('mousedown', (e) => {
    if (e.target.closest('.person-row')) return;
    isDown = true; startX = e.pageX - mc.offsetLeft; scrollLeft = mc.scrollLeft;
    mc.style.cursor = 'grabbing';
  });
  document.addEventListener('mouseup', () => { isDown = false; mc.style.cursor = 'grab'; });
  document.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    mc.scrollLeft = scrollLeft - (e.pageX - mc.offsetLeft - startX) * 2;
  });
  mc.style.cursor = 'grab';
})();

// 滚轮缩放
document.getElementById('mainContainer').addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = document.getElementById('mainContainer').getBoundingClientRect();
  const mouseX = e.clientX - rect.left + document.getElementById('mainContainer').scrollLeft;
  const targetYear = YS + mouseX / pxPerYear;
  pxPerYear *= (e.deltaY > 0 ? 0.85 : 1.18);
  pxPerYear = Math.max(1, Math.min(50, pxPerYear));
  initTimelines();
  document.getElementById('mainContainer').scrollLeft = (targetYear - YS) * pxPerYear - (e.clientX - rect.left);
}, { passive: false });

setTimeout(initTimelines, 50);
</script>
</body>
