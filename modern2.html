<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>近代史关联图谱 1800-1949</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;background:#0b0f19;color:#e6edf3;overflow:hidden;user-select:none}
#app{display:flex;flex-direction:column;height:100vh}
/* === Header === */
#header{height:48px;display:flex;align-items:center;padding:0 16px;background:#141b2d;border-bottom:1px solid #2a3a5c;flex-shrink:0;gap:12px}
.logo{font-size:16px;font-weight:700;color:#d4a843;white-space:nowrap}
.hint{font-size:11px;color:#5a6a7e;white-space:nowrap}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn-header{background:none;border:1px solid #2a3a5c;color:#5a6a7e;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:4px;transition:all 0.2s}
.btn-header:hover{color:#d4a843;border-color:#d4a843}
.legend{display:flex;gap:10px;font-size:11px;color:#8b949e}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* === Main === */
#mainContainer{flex:1;overflow:auto;position:relative;cursor:grab}
#mainContainer.grabbing{cursor:grabbing}
#timelineContainer{display:flex;flex-direction:column;position:relative;min-width:max-content}
/* === Timeline Block === */
.timeline-block{position:relative;border-bottom:1px solid #1e2d45;overflow:hidden}
.timeline-block.collapsed{flex:0 0 36px !important;min-height:36px !important}
.timeline-block.collapsed .block-content{display:none !important}
.timeline-block.collapsed+.resizer{display:none !important}
.block-header{height:36px;display:flex;align-items:center;padding:0 14px;background:#141b2d;border-bottom:1px solid #1e2d45;gap:10px;position:sticky;left:0;z-index:20;cursor:default;flex-shrink:0}
.block-title{font-size:14px;font-weight:600;color:#d4a843;white-space:nowrap}
.block-subtitle{font-size:11px;color:#5a6a7e}
.btn-collapse{background:none;border:1px solid #2a3a5c;color:#5a6a7e;width:24px;height:24px;border-radius:4px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto}
.btn-collapse:hover{color:#d4a843;border-color:#d4a843}
.block-content{position:relative;overflow:visible}
/* === Resizer === */
.resizer{flex-shrink:0;height:8px;background:#1a2236;cursor:ns-resize;position:relative;z-index:50;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.resizer:hover,.resizer.active{background:#253354}
.resizer-handle{width:40px;height:3px;border-radius:2px;background:#2a3a5c;transition:background 0.2s}
.resizer:hover .resizer-handle,.resizer.active .resizer-handle{background:#d4a843}
/* === Timeline layers === */
.dynasty-band{position:absolute;top:0;bottom:0;opacity:0.06;pointer-events:none}
.dynasty-label{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:13px;font-weight:500;color:rgba(255,255,255,0.15);white-space:nowrap;pointer-events:none;letter-spacing:0.15em}
.axis-line{position:absolute;left:0;right:0;border-top:1.5px solid rgba(255,255,255,0.2);z-index:2;pointer-events:none}
.tick{position:absolute;z-index:2;pointer-events:none;text-align:center}
.tick-line{width:1px;background:rgba(255,255,255,0.08);margin:0 auto}
.tick-label{font-size:9px;color:rgba(255,255,255,0.3);transform:translateX(-50%);white-space:nowrap;margin-top:2px}
/* === Events === */
.event-node{position:absolute;z-index:5;cursor:pointer;display:flex;flex-direction:column;align-items:center}
.event-dot{width:10px;height:10px;border-radius:50%;border:2px solid;background:rgba(11,15,25,0.9);transition:all 0.2s;flex-shrink:0}
.event-line-v{width:1px;background:rgba(255,255,255,0.08)}
.event-label{font-size:10px;color:rgba(255,255,255,0.5);white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;transition:color 0.2s;text-align:center}
.event-node:hover .event-label{color:#fff}
.event-node.linked:hover .event-dot,.event-node.linked.highlighted .event-dot{box-shadow:0 0 8px 2px currentColor;transform:scale(1.4)}
.event-node.linked.highlighted .event-label{color:#fff;font-weight:600}
/* === Persons === */
.person-row{position:absolute;display:flex;align-items:center;gap:3px;font-size:11px;white-space:nowrap;z-index:10;cursor:pointer;padding:1px 4px;border-radius:3px;transition:background 0.15s}
.person-row:hover{background:rgba(212,168,67,0.15)}
.person-emoji{font-size:13px;flex-shrink:0}
.person-name{color:rgba(255,255,255,0.6);max-width:100px;overflow:hidden;text-overflow:ellipsis}
.person-name-bar{padding:0;border-radius:3px;color:#fff;font-size:11px;white-space:nowrap;overflow:visible;opacity:0.85;height:16px;position:relative}
.person-row:hover .person-name{color:#d4a843}
.person-row .person-delete{display:none;position:absolute;right:-2px;top:-2px;width:16px;height:16px;background:#e74c3c;color:#fff;border-radius:50%;font-size:9px;align-items:center;justify-content:center;cursor:pointer;z-index:20;line-height:16px;text-align:center}
.person-row:hover .person-delete{display:flex}
/* === SVG Link Lines === */
#svgLinks{position:absolute;top:0;left:0;pointer-events:none;z-index:3}
#svgLinks line{stroke-width:1.5;stroke-dasharray:4,4;opacity:0.35;transition:opacity 0.2s,stroke-width 0.2s}
#svgLinks line.highlighted{opacity:0.8;stroke-width:2.5;stroke-dasharray:none}
/* === Right Detail Panel === */
#detailPanel{position:fixed;right:0;top:0;bottom:0;width:380px;background:rgba(19,26,42,0.97);border-left:1px solid #2a3a5c;z-index:400;overflow-y:auto;padding:28px 24px;transform:translateX(100%);transition:transform 0.35s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 48px rgba(0,0,0,0.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
#detailPanel.show{transform:translateX(0)}
#detailPanel::-webkit-scrollbar{width:4px;background:transparent}
#detailPanel::-webkit-scrollbar-thumb{background:#2a3a5c;border-radius:2px}
.dp-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;border:1px solid #2a3a5c;background:none;color:#5a6a7e;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.25s}
.dp-close:hover{background:rgba(192,57,43,0.15);color:#e74c3c;border-color:rgba(192,57,43,0.4);transform:rotate(90deg)}
.dp-emoji{font-size:40px;text-align:center;margin-bottom:12px}
.dp-name{text-align:center;font-size:22px;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,#d4a843,#e8c97a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.dp-years{text-align:center;font-size:13px;color:#5a6a7e;margin-bottom:16px;line-height:1.6}
.dp-years .lifespan-tag{display:inline-block;padding:4px 16px;border-radius:18px;background:linear-gradient(135deg,rgba(212,168,67,0.2),rgba(212,168,67,0.08));border:1px solid rgba(212,168,67,0.4);color:#d4a843;font-size:14px;font-weight:600}
.dp-desc{font-size:13px;color:#8b949e;line-height:1.9;margin-bottom:20px;padding:14px;background:#131a2a;border-radius:10px;border:1px solid #2a3a5c}
.dp-section{margin-bottom:18px}
.dp-section-title{font-size:12px;color:#5a6a7e;letter-spacing:0.1em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #2a3a5c;font-weight:600}
.dp-cat{text-align:center;margin-bottom:16px}
.dp-cat-tag{display:inline-block;padding:3px 12px;border-radius:12px;font-size:12px;color:#fff}
.dp-lifespan{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;padding:10px 16px;background:#131a2a;border-radius:10px;border:1px solid #2a3a5c}
.dp-lifespan .ls-label{font-size:12px;color:#5a6a7e}
.dp-lifespan .ls-value{font-size:18px;font-weight:700;color:#d4a843}
.dp-lifespan .ls-unit{font-size:12px;color:#5a6a7e}
.dp-perspective{padding:12px 14px;border-radius:8px;background:#131a2a;border-left:3px solid;margin-bottom:8px}
.dp-perspective.china{border-color:#e74c3c}
.dp-perspective.japan{border-color:#3498db}
.dp-perspective.world{border-color:#27ae60}
.dp-perspective-label{font-size:11px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.dp-perspective.china .dp-perspective-label{color:#e74c3c}
.dp-perspective.japan .dp-perspective-label{color:#3498db}
.dp-perspective.world .dp-perspective-label{color:#27ae60}
.dp-perspective-text{font-size:12px;color:#c9d1d9;line-height:1.7}
.dp-type-tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;color:#fff;margin-right:6px}
/* Overlay */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:399;pointer-events:none;opacity:0;transition:opacity 0.3s}
#overlay.show{opacity:1;pointer-events:auto}
/* === Add Person Modal === */
#addPersonModal{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px)}
#addPersonModal.show{display:flex}
.modal-box{background:#141b2d;border:1px solid #2a3a5c;border-radius:12px;padding:24px;width:360px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:#d4a843;margin-bottom:16px}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:12px;color:#5a6a7e;margin-bottom:4px}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;padding:8px 10px;background:#0b0f19;border:1px solid #2a3a5c;border-radius:6px;color:#e6edf3;font-size:13px;font-family:inherit;outline:none}
.modal-field input:focus,.modal-field select:focus,.modal-field textarea:focus{border-color:#d4a843}
.modal-field textarea{resize:vertical;min-height:80px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btn{padding:8px 20px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-family:inherit;transition:all 0.2s}
.modal-btn.primary{background:#d4a843;color:#0b0f19;font-weight:600}
.modal-btn.primary:hover{background:#e8c97a}
.modal-btn.secondary{background:#2a3a5c;color:#8b949e}
.modal-btn.secondary:hover{background:#3a4a6c}
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div class="logo">近代史关联图谱</div>
    <div class="hint">1800-1949 · 滚轮缩放 · 拖拽平移</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div>战争</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3498db"></div>政治</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div>文化</div>
      <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div>经济</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1abc9c"></div>科技</div>
    </div>
    <div class="header-actions">
      <button class="btn-header" id="btnAddPerson">➕ 添加人物</button>
    </div>
  </header>
  <div id="mainContainer">
    <div id="timelineContainer">
      <div class="timeline-block" id="chinaBlock" style="flex:5;min-height:260px">
        <div class="block-header">
          <span class="block-title">📜 中国史</span>
          <span class="block-subtitle" id="chinaStats"></span>
          <button class="btn-collapse" data-block="chinaBlock">▲</button>
        </div>
        <div class="block-content" id="chinaContent"></div>
      </div>
      <div class="resizer" id="resizer1"><div class="resizer-handle"></div></div>
      <div class="timeline-block" id="japanBlock" style="flex:3;min-height:220px">
        <div class="block-header">
          <span class="block-title">🏯 日本史</span>
          <span class="block-subtitle" id="japanStats"></span>
          <button class="btn-collapse" data-block="japanBlock">▲</button>
        </div>
        <div class="block-content" id="japanContent"></div>
      </div>
      <div class="resizer" id="resizer2"><div class="resizer-handle"></div></div>
      <div class="timeline-block" id="worldBlock" style="flex:2;min-height:220px">
        <div class="block-header">
          <span class="block-title">🌍 世界史</span>
          <span class="block-subtitle" id="worldStats"></span>
          <button class="btn-collapse" data-block="worldBlock">▲</button>
        </div>
        <div class="block-content" id="worldContent"></div>
      </div>
    </div>
    <svg id="svgLinks"></svg>
  </div>
</div>
<div id="overlay"></div>
<aside id="detailPanel">
  <button class="dp-close" id="dpClose">✕</button>
  <div id="dpContent"></div>
</aside>
<!-- Add Person Modal -->
<div id="addPersonModal">
  <div class="modal-box">
    <div class="modal-title">添加人物</div>
    <div class="modal-field"><label>所属时间轴</label><select id="addAxis"><option value="china">中国史</option><option value="japan">日本史</option><option value="world">世界史</option></select></div>
    <div class="modal-field"><label>姓名</label><input id="addName" placeholder="例：李白"></div>
    <div class="modal-field"><label>出生年份</label><input id="addBirth" type="number" placeholder="例：1800"></div>
    <div class="modal-field"><label>逝世年份（留空=在世）</label><input id="addDeath" type="number" placeholder="例：1900"></div>
    <div class="modal-field"><label>类别</label><select id="addCat"><option value="scholar">学者</option><option value="military">军事家</option><option value="scientist">科学家</option><option value="artist">艺术家</option><option value="inventor">发明家</option><option value="philosopher">思想家</option><option value="emperor">帝王</option><option value="general">将领</option><option value="politician">政治家</option><option value="sage">伟人</option></select></div>
    <div class="modal-field"><label>Emoji图标</label><input id="addEmoji" placeholder="例：⚔️" maxlength="2"></div>
    <div class="modal-field"><label>简介（不少于100字）</label><textarea id="addDesc" placeholder="请输入人物简介，不少于100字"></textarea></div>
    <div class="modal-btns">
      <button class="modal-btn primary" id="addSubmit">确认添加</button>
      <button class="modal-btn secondary" id="addCancel">取消</button>
    </div>
  </div>
</div>

<script>
// ========== CONFIG ==========
const YS = 1800, YE = 1949;
let pxPerYear = 3;

const EVT_COLORS = { war:'#e74c3c', politics:'#3498db', culture:'#f39c12', economy:'#27ae60', science:'#1abc9c' };
const CAT_COLORS = { emperor:'#e74c3c', military:'#9b59b6', scholar:'#3498db', philosopher:'#1abc9c', scientist:'#27ae60', artist:'#e67e22', politician:'#7f8c8d', sage:'#d4a843', general:'#9b59b6', inventor:'#1abc9c' };

// ========== UTILITY ==========
function x(year) { return (year - YS) * pxPerYear; }
function totalW() { return (YE - YS) * pxPerYear + 400; }

// ========== LINKED EVENTS ==========
const LINKED_EVENTS = [
  { id:'e_napoleon', year:1804, name:'拿破仑称帝', type:'politics',
    china:'清朝嘉庆年间，白莲教起义席卷川楚陕五省，清廷调兵围剿耗费巨资', japan:'德川幕府第十代将军德川家治在位，锁国政策严格实施，仅保留长崎对荷兰和中国贸易', world:'拿破仑加冕为法兰西皇帝，通过民法典奠定现代法律基础，此后十年横扫欧洲大陆' },
  { id:'e_opium', year:1840, name:'鸦片战争', type:'war',
    china:'英国以虎门销烟为借口发动侵华战争，清军节节败退，1842年被迫签订《南京条约》割让香港岛并开放五口通商，中国由此沦为半殖民地半封建社会', japan:'天保年间大饥荒持续，社会矛盾加剧，幕府财政濒临崩溃', world:'大英帝国为打开中国市场、扭转贸易逆差而发动战争，以蒸汽铁甲舰和线膛步兵碾压清军' },
  { id:'e_taiping', year:1851, name:'太平天国起义', type:'war',
    china:'洪秀全以拜上帝教为旗帜建立太平天国，定都天京，历时14年波及18省，造成约两千万至三千万人死亡，是中国历史上规模最大的农民起义', japan:'黑船来航前夜，幕府仍沉浸在太平之梦中', world:'19世纪全球最大规模内战之一，远超同期美国南北战争的伤亡人数' },
  { id:'e_perry', year:1853, name:'黑船来航', type:'politics',
    china:'太平天国定都天京，清政府内外交困', japan:'美国海军准将佩里率领四艘蒸汽军舰驶入江户湾，递交国书要求开国，幕府被迫结束二百余年锁国', world:'美国向西太平洋扩张，以炮舰外交打开东亚市场' },
  { id:'e_second_opium', year:1856, name:'第二次鸦片战争', type:'war',
    china:'英法联军攻入北京焚毁圆明园，咸丰帝出逃承德，签订《北京条约》增开通商口岸，沙俄趁火打劫割占外东北百余万平方公里', japan:'被迫签订《日美修好通商条约》等一系列不平等条约，开放横滨、长崎等港口', world:'英法联手远征东亚，展示工业革命后的军事碾压能力，殖民扩张达到高峰' },
  { id:'e_communist', year:1848, name:'共产党宣言', type:'culture',
    china:'鸦片战争前夜，清朝闭关锁国，龚自珍、魏源等开明知识分子开始睁眼看世界', japan:'天保改革失败后幕府统治僵化，兰学在少数知识分子中秘密传播', world:'马克思和恩格斯发表《共产党宣言》，提出阶级斗争理论和无产阶级革命学说' },
  { id:'e_civil_war', year:1861, name:'美国南北战争', type:'war',
    china:'咸丰帝驾崩，慈禧太后发动辛酉政变夺取政权，开启近半个世纪的垂帘听政', japan:'萨摩藩秘密派遣使节赴欧洲考察军事，倒幕力量暗中积蓄', world:'林肯领导北方击败南方，废除奴隶制，约62万人死亡' },
  { id:'e_meiji', year:1868, name:'明治维新', type:'politics',
    china:'曾国藩、李鸿章、左宗棠等掀起洋务运动，创办江南制造总局、福州船政局、北洋水师', japan:'萨长同盟推翻德川幕府260年统治，明治天皇亲政，推行富国强兵、殖产兴业、文明开化三大政策', world:'西方列强已完成第一次工业革命，日本成为亚洲唯一成功近代化的国家' },
  { id:'e_sino_jp', year:1894, name:'甲午战争', type:'war',
    china:'北洋水师在黄海海战中惨败，刘公岛全军覆没，签订《马关条约》割让台湾及澎湖列岛、赔款白银两亿两', japan:'联合舰队击败北洋水师，割占台湾获赔款两亿两白银，跻身列强之列', world:'甲午战争刺激了帝国主义瓜分中国的狂潮，标志着东亚以中国为中心的朝贡体系终结' },
  { id:'e_hundred_days', year:1898, name:'戊戌变法', type:'politics',
    china:'光绪帝推行维新变法103天，慈禧太后发动戊戌政变软禁光绪帝，谭嗣同等六君子在菜市口就义', japan:'明治维新已成功推行三十年，颁布宪法，开设帝国议会', world:'改良与革命的争论在亚洲深刻展开' },
  { id:'e_boxer', year:1900, name:'八国联军', type:'war',

    desc:'左宗棠（1812-1885），字季高，湖南湘阴人，晚清杰出军事家和政治家。在清廷犹豫不决时他力主收复新疆，以六十多岁高龄抬棺出征，历时两年击败阿古柏收复新疆全境，保卫了中国六分之一的领土。他创办福州船政局培养中国近代海军人才，是中国近代海防建设的先驱。' },
  { name:'洪秀全', birth:1814, death:1864, cat:'politician', emoji:'🔥',
    desc:'洪秀全（1814-1864），广东花县人，太平天国运动领袖。他屡试不第后创立拜上帝教，1851年在广西金田村发动起义建立太平天国，定都天京与清廷对峙十四年。其颁布的天朝田亩制度提出了有田同耕有饭同食的平均主义理想，但后期沉于享乐、内斗频发，最终在天京被湘军攻陷后自尽。这场运动造成约两千万人死亡，是中国历史上规模最大的农民战争。' },
  { name:'慈禧太后', birth:1835, death:1908, cat:'emperor', emoji:'👑',
    desc:'慈禧太后（1835-1908），叶赫那拉氏，晚清最高统治者近半个世纪。她通过辛酉政变夺取权力两次垂帘听政。她镇压戊戌变法处死六君子，义和团运动引八国联军后仓皇西逃却仍不放权。虽有争议，但她也推行了清末新政、废除科举、改革军制等举措。其统治时期中国屡遭列强欺凌，加速了清朝的灭亡。' },
  { name:'孙中山', birth:1866, death:1925, cat:'sage', emoji:'🏛️',
    desc:'孙中山（1866-1925），名文字逸仙，广东香山人，中国民主革命的伟大先行者和中华民国国父。他创立兴中会和同盟会，提出驱除鞑虏恢复中华创立民国平均地权的革命纲领和三民主义学说。历经十次起义失败终于在武昌起义后建立中华民国。他晚年改组国民党实行联俄联共扶助农工三大政策。' },
  { name:'康有为', birth:1858, death:1927, cat:'scholar', emoji:'📜',
    desc:'康有为（1858-1927），字广厦，广东南海人，戊戌变法的主要推动者和近代维新思想的代表人物。他撰写的新学伪经考和孔子改制考为变法提供理论依据，与梁启超一起推动光绪帝实行维新变法。变法失败后流亡海外十六年，游历三十多个国家，著《大同书》描绘人类社会的终极理想。' },
  { name:'梁启超', birth:1873, death:1929, cat:'scholar', emoji:'📰',
    desc:'梁启超（1873-1929），字卓如，广东新会人，中国近代最伟大的启蒙思想家、政治家和学者。他是戊戌变法的核心人物之一，变法失败后逃亡日本创办《清议报》和《新民丛报》，以犀利的文笔宣传变法维新思想，少年中国说鼓舞了一代青年。他在学术上涉猎极广，著述超过一千四百万字。' },
  { name:'鲁迅', birth:1881, death:1936, cat:'artist', emoji:'✍️',
    desc:'鲁迅（1881-1936），本名周树人，浙江绍兴人，中国现代文学的奠基人和新文化运动的主将。他留学日本学医后弃医从文，1918年发表中国第一篇白话小说《狂人日记》深刻揭露封建礼教吃人本质。其代表作《阿Q正传》《祝福》《孔乙己》等塑造了中国现代文学的经典人物画廊。横眉冷对千夫指俯首甘为孺子牛的精神影响了整个现代中国的知识界。' },
  { name:'蔡元培', birth:1868, death:1940, cat:'scholar', emoji:'🎓',
    desc:'蔡元培（1868-1940），字鹤卿，浙江绍兴人，中国现代教育和学术制度的奠基人。他曾任中华民国首任教育总长和北京大学校长，提出思想自由兼容并包的办学方针，使北大成为新文化运动的策源地。他倡导五育并举教育理念，创办中央研究院推动中国现代科学研究，被誉为学界泰斗人世楷模。' },
  { name:'宋庆龄', birth:1893, death:1981, cat:'sage', emoji:'🌹',
    desc:'宋庆龄（1893-1981），原籍广东文昌，孙中山夫人，二十世纪最伟大的中国女性之一。她青年时代追随孙中山投身民主革命，孙中山去世后坚定捍卫三大政策。抗战期间在香港创办保卫中国同盟为抗战筹集物资。新中国成立后担任中央人民政府副主席，被授予中华人民共和国名誉主席称号。她一生追求正义与和平，是国际公认的伟大女性。' },
  { name:'严复', birth:1854, death:1921, cat:'scholar', emoji:'📖',
    desc:'严复（1854-1921），字几道，福建侯官人，中国近代最杰出的翻译家和启蒙思想家。他留学英国格林尼治皇家海军学院，归国后翻译赫胥黎的《天演论》，以物竞天择适者生存的进化论思想震动了整个知识界，为维新变法提供了理论武器。他还翻译了《原富》《群己权界论》《法意》等西方经典名著，系统介绍了西方政治经济学和法学思想。' },
  { name:'魏源', birth:1794, death:1857, cat:'scholar', emoji:'🗺️',
    desc:'魏源（1794-1857），字默深，湖南邵阳人，中国近代睁眼看世界的先驱之一。他受林则徐嘱托编纂《海国图志》一百卷，详细介绍了世界各国的地理历史和政治制度，提出师夷长技以制夷的著名主张，成为洋务运动的思想先导。该书传入日本后对幕末维新志士也产生了深远影响，被视为东亚近代化思想的重要源头。' },
  { name:'黄兴', birth:1874, death:1916, cat:'military', emoji:'⚔️',
    desc:'黄兴（1874-1916），字克强，湖南善化人，辛亥革命的主要领袖之一，与孙中山并称孙黄。他多次亲赴前线指挥战斗，在黄花岗起义中率敢死队进攻两广总督署右手断两指，在武昌起义后指挥阳夏保卫战。他是华兴会和同盟会的主要创建者之一，一生以实干著称，被誉为革命军中之马前卒。' },
  { name:'冯子材', birth:1818, death:1903, cat:'general', emoji:'🛡️',
    desc:'冯子材（1818-1903），字南干，广西钦州人，晚清抗法名将。他年近七旬时临危受命赴广西前线抗法，1885年在镇南关战役中身先士卒率军大败法军，取得中国近代反侵略战争中第一次重大胜利，导致法国茹费理内阁倒台。他以白刃战击败装备精良的法军，证明了中国军队只要有正确指挥和坚定意志就能战胜西方列强。' },
  { name:'秋瑾', birth:1875, death:1907, cat:'sage', emoji:'🦅',
    desc:'秋瑾（1875-1907），字竞雄，号鉴湖女侠，浙江绍兴人，中国近代女权和女学思想的倡导者，革命先烈。她冲破封建家庭束缚东渡日本留学，加入光复会和同盟会积极从事反清革命活动。1907年组织浙皖起义失败后被清政府逮捕，在绍兴轩亭口慷慨就义年仅三十二岁。她是中国女性解放运动的先驱，秋风秋雨愁煞人的绝笔令人扼腕。' },
  { name:'胡适', birth:1891, death:1962, cat:'scholar', emoji:'📝',
    desc:'胡适（1891-1962），字适之，安徽绩溪人，中国新文化运动和白话文运动的领袖之一。他留学美国哥伦比亚大学师从杜威，1917年在《新青年》发表《文学改良刍议》倡导白话文运动，是新文学运动的理论奠基人。他提出大胆假设小心求实的治学方法，在哲学、文学、史学等领域均有重要贡献。他一生倡导自由主义和民主科学精神。' },
  { name:'张之洞', birth:1837, death:1909, cat:'politician', emoji:'🏭',
    desc:'张之洞（1837-1909），字孝达，直隶南皮人，晚清洋务运动后期的核心人物。他创办汉阳铁厂、湖北枪炮厂、织布局等近代工业，建立两湖书院和自强学堂（武汉大学前身），编练新军。他提出中学为体西学为用的指导思想，对晚清的工业化和教育近代化产生了深远影响。他是清流领袖出身却成为最务实的洋务实践者。' },
  { name:'关天培', birth:1781, death:1841, cat:'general', emoji:'⚓',
    desc:'关天培（1781-1841），字仲因，江苏山阴人，鸦片战争中壮烈殉国的民族英雄。他任广东水师提督期间加强海防建设，在虎门炮台指挥守军英勇抵抗英军进攻。1841年2月英军猛攻虎门，他亲燃火炮痛击敌舰，在弹尽援绝的情况下仍坚持战斗，最终身受数十创壮烈殉国，是近代中国抗击外侮的第一位高级将领。' },
  { name:'丁汝昌', birth:1836, death:1895, cat:'general', emoji:'🚢',
    desc:'丁汝昌（1836-1895），字禹廷，安徽庐江人，北洋水师提督。他早年参加淮军转战南北，后奉命统领北洋水师，主持北洋舰队的训练和管理。甲午战争中他指挥黄海海战力战日舰，后退守威海卫。在日军海陆夹击下他拒绝日军劝降，1895年2月服鸦片自尽殉国，展现了军人不降的气节。' },
  { name:'邓世昌', birth:1849, death:1894, cat:'general', emoji:'🔥',
    desc:'邓世昌（1849-1894），字正卿，广东番禺人，北洋水师致远舰管带，甲午战争中的民族英雄。1894年9月17日黄海海战中，他指挥致远舰奋勇作战，在弹尽舰伤的情况下毅然下令开足马力撞向日舰吉野号，不幸被鱼雷击中舰体爆炸沉没，全舰二百四十六名官兵壮烈殉国。光绪帝撰挽联此日漫挥天下泪有公足壮海军威。' },
  { name:'谭嗣同', birth:1865, death:1898, cat:'sage', emoji:'🩸',
    desc:'谭嗣同（1865-1898），字复生，湖南浏阳人，戊戌六君子之一，中国近代为改革流血的第一人。他深受佛学和西学影响著《仁学》提出冲决网罗的激进改革思想，积极参与维新变法运动。戊戌政变后他拒绝逃亡，说我自横刀向天笑去留肝胆两昆仑，与林旭等五人在菜市口慷慨就义年仅三十三岁，以鲜血唤醒了国人的改革意识。' },
  { name:'顾维钧', birth:1888, death:1985, cat:'politician', emoji:'🌍',
    desc:'顾维钧（1888-1985），字少川，上海人，中国近代最杰出的外交家。他留学美国哥伦比亚大学获法学博士，1919年巴黎和会上就山东问题据理力争，拒绝在凡尔赛条约上签字，是中国外交史上第一次对列强说不。他在国际联盟和联合国代表中国发声，是联合国的创始成员之一。他的外交生涯横跨半个世纪，被誉为民国第一外交家。' },
  { name:'沈葆桢', birth:1820, death:1879, cat:'politician', emoji:'⚓',
    desc:'沈葆桢（1820-1879），字幼丹，福建侯官人，林则徐的女婿，中国近代海军的先驱。他在担任福建船政大臣期间主持福州船政局，建造了中国第一批近代军舰，创办船政学堂培养了中国近代第一批海军人才，包括严复、邓世昌、詹天佑等杰出人物。他还率军赴台湾驱逐日本侵略军，为保卫台湾立下功勋。' },
  { name:'容闳', birth:1828, death:1912, cat:'scholar', emoji:'🎓',
    desc:'容闳（1828-1912），字达萌，广东香山人，中国首位毕业于美国大学的留学生，被誉为中国留学生之父。他1854年毕业于耶鲁大学，归国后积极推动中国教育近代化，促成清政府派遣首批留美幼童一百二十人赴美学习，开创了中国公派留学的先河。他还参与筹建江南制造总局，是中国近代工业和教育事业的开拓者。' },
  { name:'徐寿', birth:1818, death:1884, cat:'scientist', emoji:'⚗️',
    desc:'徐寿（1818-1884），字雪村，江苏无锡人，中国近代化学的先驱和造船工程师。他自学西方科学知识，与华蘅芳合作研制出中国第一台蒸汽机和第一艘蒸汽轮船黄鹄号，是中国近代机械工业的开端。他与英国传教士傅兰雅合作翻译了大量西方化学著作，首创了化学元素汉译命名体系，如钠钾锌等元素名称沿用至今。' },
  { name:'詹天佑', birth:1861, death:1919, cat:'inventor', emoji:'🚂',
    desc:'詹天佑（1861-1919），字眷诚，安徽婺源人，中国铁路之父。他是首批留美幼童之一，毕业于耶鲁大学土木工程系。1905年他主持修建京张铁路，创造性地设计了人字形铁路线路解决了陡坡难题，是中国人自行设计建造的第一条铁路，打破了外国人中国工程师不能修铁路的偏见。他还制定了中国的铁路工程标准，培养了大批铁路建设人才。' },
  { name:'龚自珍', birth:1792, death:1841, cat:'scholar', emoji:'📝',
    desc:'龚自珍（1792-1841），字璱人，号定盦，浙江仁和人，晚清思想启蒙的先驱。他以犀利文笔批判封建专制的腐朽，呼吁变法改革，被梁启超评为清末思想解放第一人。他的我劝天公重抖擞不拘一格降人才至今传诵，鸦片战争前夕他忧愤而终，未能看到变法实现，却为后来的维新运动播下了思想的火种。' },
  { name:'奕訢', birth:1833, death:1898, cat:'politician', emoji:'🏛️',
    desc:'奕訢（1833-1898），号恭亲王，道光帝第六子，晚清洋务运动在朝廷中的核心推动者。他主持总理各国事务衙门开创中国近代外交体制，支持曾国藩李鸿章等人创办军事工业和新式学堂。他与慈禧联手发动辛酉政变后又长期被排挤，甲午战败后再度被起用却已无力回天。他是晚清最具开明视野的皇族却始终壮志难酬。' },
  { name:'张謇', birth:1853, death:1926, cat:'inventor', emoji:'🏭',
    desc:'张謇（1853-1926），字季直，江苏南通人，晚清状元实业家和中国近代民族工业的先驱。他1894年中状元后弃官从商，创办大生纱厂和通海垦牧公司等数十家企业，建设了堪称模范的南通地方自治实验区。他还创办通州师范学校等三百余所教育机构，被誉为实业救国的典范。毛泽东曾评价中国民族工业轻工业不能忘记张謇。' },
  { name:'李善兰', birth:1811, death:1882, cat:'scientist', emoji:'📐',
    desc:'李善兰（1811-1882），字壬叔，浙江海宁人，中国近代数学的先驱和科学翻译家。他在级数求和和素数论方面做出了世界级的原创贡献，与英国传教士伟烈亚力合作翻译了《代数学》《代微积拾级》等西方数学经典，首次将微积分引入中国。他创造的许多数学术语如代数、微分、积分、函数等沿用至今，深刻影响了中国的数学教育和科学术语体系。' },
  { name:'伍廷芳', birth:1842, death:1922, cat:'politician', emoji:'⚖️',
    desc:'伍廷芳（1842-1922），字文爵，广东新会人，中国近代第一位法学博士和外交家。他留学英国林肯法律学院获法学博士学位，回国后参与修订法律和对外谈判，是中国近代法律制度改革的开拓者。他曾两度出任驻美公使，民国初年担任外交总长和司法总长，为确立中国现代法律体系做出了奠基性贡献。' },
  { name:'邹容', birth:1885, death:1905, cat:'philosopher', emoji:'🔥',
    desc:'邹容（1885-1905），字蔚丹，四川巴县人，中国近代最年轻的革命思想家和宣传家。他十八岁撰写《革命军》一书号召推翻清朝建立中华共和国，全书两万余言气势磅礴被誉为中国的人权宣言。该书出版后风靡海内外影响极大，他因此被捕入狱，1905年病逝于上海租界监狱年仅二十岁。中华民国成立后追赠为大将军。' },
  { name:'章太炎', birth:1869, death:1936, cat:'scholar', emoji:'📚',
    desc:'章太炎（1869-1936），名炳麟，字枚叔，浙江余杭人，中国近代最杰出的国学大师和革命思想家。他精研经学、小学、佛学，在音韵训诂领域成就卓著，被称为清代朴学的殿军。他因《驳康有为论革命书》和为邹容《革命军》作序而入狱三年，出狱后东渡日本主持《民报》与改良派展开论战。他一生桀骜不逊，被世人称为章疯子，却是近代中国最有骨气的学者之一。' },
  { name:'齐白石', birth:1864, death:1957, cat:'artist', emoji:'🎨',
    desc:'齐白石（1864-1957），原名纯芝，湖南湘潭人，二十世纪中国最伟大的画家之一。他出身贫寒从木匠自学成为一代宗师，擅长花鸟虫鱼山水人物，以似与不似之间的独特画风融合民间艺术与文人画传统。他衰年变法自创红花墨叶一派，作品洋溢着质朴清新的生命力。1953年被授予人民艺术家称号，是中国画走向现代的关键人物。' },
  { name:'陶行知', birth:1891, death:1946, cat:'scholar', emoji:'🏫',
    desc:'陶行知（1891-1946），原名文濬，安徽歙县人，中国现代最伟大的平民教育家和思想家。他留学美国哥伦比亚大学师从杜威，归国后投身平民教育运动，创办晓庄师范学校践行生活教育理论。他提出生活即教育、社会即学校、教学做合一三大主张，为推广大众教育奔波一生积劳成疾，逝世时年仅五十五岁。毛泽东称他为伟大的人民教育家。' },
  { name:'竺可桢', birth:1890, death:1974, cat:'scientist', emoji:'🌡️',
    desc:'竺可桢（1890-1974），字藕舫，浙江绍兴人，中国现代气象学和地理学的奠基人。他留学美国哈佛大学获气象学博士，归国后创建中国第一个气象研究所和气象台网，开创了中国气候学和物候学研究。他担任浙江大学校长十三年使之崛起为一流学府，其专著《中国近五千年来气候变迁的初步研究》享誉国际学术界。' },
  { name:'刘永福', birth:1837, death:1917, cat:'general', emoji:'🏴',
    desc:'刘永福（1837-1917），字渊亭，广西钦州人，晚清抗法抗日名将和民族英雄。他在中法战争中率黑旗军在越南屡败法军击毙法军司令安邺和李维业，威震中外。甲午战争后他驻守台湾抗击日军近五个月，是台湾抗日斗争的核心人物。他从草莽崛起成为一代名将，一生三次抗击外国侵略者，是近代中国抵抗外侮的传奇人物。' },
  { name:'唐绍仪', birth:1862, death:1938, cat:'politician', emoji:'🤝',
    desc:'唐绍仪（1862-1938），字少川，广东香山人，中华民国第一任内阁总理。他是第三批留美幼童，就读哥伦比亚大学，归国后在晚清外交界崭露头角。辛亥革命后他代表北方与南方代表伍廷芳进行南北议和，促成清帝退位和民国建立。1912年出任第一任总理但仅三月即因与袁世凯政见不合而辞职，晚年不幸被误杀于上海。' },
];

const JAPAN_PERSONS = [
  { name:'德川家庆', birth:1793, death:1853, cat:'emperor', emoji:'🏯',
    desc:'德川家庆（1793-1853），江户幕府第十二代将军，在位期间正值幕府统治由盛转衰的关键时期。他面对天保大饥荒、大盐平八郎之乱等社会危机时应对无力，西方列强逼近日本时仍坚持锁国政策。他去世仅数月后佩里黑船来航彻底打破了日本的闭关锁国，标志着幕府体制走向末路的开端。' },
  { name:'胜海舟', birth:1823, death:1899, cat:'politician', emoji:'⚓',
    desc:'胜海舟（1823-1899），江户末期至明治时期的重要政治家和海军创始人。他学习西洋军事和航海技术，创建日本第一所海军学校神户海军操练所。在戊辰战争中他作为幕府代表与西乡隆盛谈判实现江户无血开城，避免了东京的一场浩劫。明治维新后他担任海军卿等职推动日本近代化，主张和平外交路线反对对外扩张。' },
  { name:'西乡隆盛', birth:1828, death:1877, cat:'military', emoji:'⚔️',
    desc:'西乡隆盛（1828-1877），萨摩藩出身，与木户孝允、大久保利通并称维新三杰，是倒幕运动和明治维新的核心领袖。他出身下级武士却以卓越的领导才能推动了幕府灭亡。维新后因征韩论失败下野回到鹿儿岛，1877年被不满士族推举为领袖发动西南战争，在城山之战中负伤后切腹自杀。他被日本国民视为最后的武士而深受敬仰。' },
  { name:'大久保利通', birth:1830, death:1878, cat:'politician', emoji:'🔨',
    desc:'大久保利通（1830-1878），萨摩藩出身，维新三杰之一，明治维新后日本政府的实际核心人物。他推动版籍奉还和废藩置县消灭了封建割据，推行地租改正和殖产兴业政策奠定了日本近代工业化的基础。他的铁腕统治方式被称为大久保专制，1878年被反对士族刺杀身亡。他被公认为日本近代化的总设计师。' },
  { name:'伊藤博文', birth:1841, death:1909, cat:'politician', emoji:'📜',
    desc:'伊藤博文（1841-1909），长州藩出身，日本近代政治制度的奠基人和首任内阁总理大臣。他主导制定《大日本帝国宪法》建立了亚洲第一个立宪君主制国家，四度出任首相推动日本近代化改革。1909年在哈尔滨被朝鲜独立运动志士安重根刺杀身亡。' },
  { name:'福泽谕吉', birth:1835, death:1901, cat:'scholar', emoji:'📚',
    desc:'福泽谕吉（1835-1901），日本近代最重要的启蒙思想家和教育家，庆应义塾大学创始人。他三次随使节团出访欧美写成《西洋事情》向日本介绍西方文明，其著作《劝学篇》和《文明论之概略》影响了整个明治时代的知识界。他倡导脱亚入欧论，其肖像至今印在一万日元纸币上。' },
  { name:'东乡平八郎', birth:1848, death:1934, cat:'military', emoji:'⚓',
    desc:'东乡平八郎（1848-1934），日本海军元帅和军神，日俄战争中对马海峡海战的指挥者。他在1905年的对马海战中以压倒性优势全歼俄国波罗的海舰队，以损失三艘水雷艇的微小代价击沉俄国多艘战列舰。他被西方誉为东方的纳尔逊，是日本海军精神的象征人物。' },
  { name:'夏目漱石', birth:1867, death:1916, cat:'artist', emoji:'✍️',
    desc:'夏目漱石（1867-1916），日本近代文学最伟大的作家之一，本名夏目金之助。他的代表作《我是猫》《心》《哥儿》等以犀利幽默的笔触深刻描绘了明治时代知识分子的精神困境。他在小说中首创私小说文体影响了整个日本现代文学。他的头像被印在一千日元纸币上。' },
  { name:'山县有朋', birth:1838, death:1922, cat:'military', emoji:'🎖️',
    desc:'山县有朋（1838-1922），长州藩出身，日本近代陆军之父和军国主义的奠基人。他从下级武士崛起为陆军大将，建立近代征兵制和军事学院体系，是日本陆军的核心创建者。他两次出任首相，推动征韩论和大陆政策将日本引向对外扩张道路。' },
  { name:'裕仁天皇', birth:1901, death:1989, cat:'emperor', emoji:'👑',
    desc:'裕仁天皇（1901-1989），日本第一百二十四代天皇，在位六十三年为昭和时代。他统治时期日本发动了侵华战争和太平洋战争，给亚洲各国人民带来深重灾难。1945年发表《人间宣言》否定天皇神格，在美国占领下推动日本民主化改革。' },
  { name:'东条英机', birth:1884, death:1948, cat:'politician', emoji:'💀',
    desc:'东条英机（1884-1948），日本军国主义代表人物和二战甲级战犯。他作为陆军大臣推动日本走向全面战争，1941年出任首相策划并发动了偷袭珍珠港和太平洋战争。日本战败后他试图自杀未遂，1948年在远东国际军事法庭上被判处绞刑。' },
  { name:'山本五十六', birth:1884, death:1943, cat:'military', emoji:'✈️',
    desc:'山本五十六（1884-1943），日本海军联合舰队司令长官，策划珍珠港偷袭的军事天才。他曾留学美国哈佛大学深知美国工业实力，反对对美开战但作为军人执行了偷袭珍珠港的作战计划。1943年其座机在所罗门群岛上空被美军击落阵亡。' },
  { name:'木户孝允', birth:1833, death:1877, cat:'politician', emoji:'📝',
    desc:'木户孝允（1833-1877），长州藩出身，维新三杰之一，明治维新的核心领导者之一。他在倒幕运动中发挥了关键作用，维新后推动版籍奉还、废藩置县和建立近代教育制度。他主张立宪政治和民权思想，是明治政府中最具开明倾向的领导者。他在西南战争期间积劳成疾去世，年仅四十四岁。' },
  { name:'坂本龙马', birth:1836, death:1867, cat:'sage', emoji:'⛵',
    desc:'坂本龙马（1836-1867），土佐藩出身，日本幕末时期最具传奇色彩的维新志士。他促成萨长同盟将两大强藩联合起来共同倒幕，是幕末政治格局转变的关键人物。他提出船中八策为明治维新的政治蓝图奠定了基础，包括大政奉还、议会设置、宪法制定等核心内容。他在京都近江屋被暗杀年仅三十一岁，是日本人心目中最受欢迎的历史人物之一。' },
  { name:'高杉晋作', birth:1839, death:1867, cat:'military', emoji:'🏴',
    desc:'高杉晋作（1839-1867），长州藩出身，幕末维新的杰出军事家和政治家。他受上海之行震撼后立志倒幕，创建奇兵队等诸队以平民武装取代武士军队，在四境战争中击败幕府征讨军保全了长州藩。他与桂小五郎合作推动萨长同盟，为明治维新奠定了军事基础。他因肺结核病逝年仅二十八岁，是幕末最耀眼的流星。' },
  { name:'新渡户稻造', birth:1867, death:1933, cat:'scholar', emoji:'📙',
    desc:'新渡户稻造（1867-1933），岩手县出身，日本著名农学家、教育家和思想家。他用英文撰写《武士道》一书向西方世界介绍日本的精神传统，成为日本文化输出的经典之作。他曾任东京帝国大学教授和第一高等学校校长，致力于国际文化交流和和平事业，是太平洋问题调查会的创始人之一。' },
  { name:'与谢野晶子', birth:1878, death:1942, cat:'artist', emoji:'🌸',
    desc:'与谢野晶子（1878-1942），大阪出身，日本近代最著名的女诗人和文化评论家。她以浪漫主义诗歌闻名，代表作《乱发》以大胆奔放的风格打破了传统女性文学的束缚。日俄战争期间她发表反战诗歌《君勿死》公开质疑战争的意义，在当时引起巨大争议。她晚年致力于女性解放运动和和平主义活动，是日本近代女性文学的先驱。' },
  { name:'二宫尊德', birth:1787, death:1856, cat:'philosopher', emoji:'🌾',
    desc:'二宫尊德（1787-1856），相模国出身，江户后期著名的农政家和思想家，被日本人尊称为二宫金次郎。他出身贫寒通过刻苦自学成为农政专家，修复了数百个荒废的村庄，其报德思想强调勤劳、节约、分度和推让，对日本人的劳动伦理产生了深远影响。他的铜像立于日本各地学校，背着柴火边走边读书的形象是日本勤勉精神的象征。' },
  { name:'涩泽荣一', birth:1840, death:1931, cat:'inventor', emoji:'🏦',
    desc:'涩泽荣一（1840-1931），埼玉县出身，日本近代资本主义之父。他参与明治维新后进入大藏省制定近代货币和银行制度，后辞官从商创办了日本第一家银行第一国立银行。他一生参与创办的企业超过五百家，涵盖银行、铁路、纺织、造纸等几乎所有近代产业领域，以论语加算盘的经营哲学将儒家道德与资本主义相结合。' },
  { name:'志贺洁', birth:1871, death:1957, cat:'scientist', emoji:'🔬',
    desc:'志贺洁（1871-1957），宫城县出身，日本近代最杰出的细菌学家。他在1897年发现了痢疾杆菌（志贺菌），这是日本人在医学领域的第一个世界级发现。他的研究为传染病的防治奠定了基础，志贺菌属以他的姓氏命名。他还致力于公共卫生事业，推动日本近代医学教育的发展。' },
  { name:'岩仓具视', birth:1825, death:1883, cat:'politician', emoji:'👘',
    desc:'岩仓具视（1825-1883），京都出身，明治维新的核心政治家之一。他原为朝廷公卿，暗中策划王政复古推动倒幕运动。维新后他率领岩仓使节团出访欧美一年十个月，深入考察西方制度和文化，为日本的近代化改革提供了第一手资料和方向指引。他坚决反对征韩论维护了维新政府的稳定，被尊为维新之柱石。' },
  { name:'大盐平八郎', birth:1793, death:1837, cat:'philosopher', emoji:'🍚',
    desc:'大盐平八郎（1793-1837），大阪出身，江户后期的阳明学者和起义领袖。他原为大阪町奉行属下的町年寄，因不满幕府对天保大饥荒的赈灾不力，散尽家财救济灾民后于1837年发动起义。他号召农民和市民推翻腐败的幕府统治，虽起义仅一日即失败，他自焚而死，但这是江户时代首次由武士领导的城市起义，动摇了幕府统治的根基。' },
  { name:'中江兆民', birth:1847, death:1901, cat:'philosopher', emoji:'🗽',
    desc:'中江兆民（1847-1901），土佐藩出身，日本近代自由民权运动的思想领袖和卢梭学说的传播者。他留学法国深受启蒙思想影响，归国后翻译《社会契约论》创办《政理丛谈》宣传民权思想，被称为东洋卢梭。他积极参与自由民权运动为制定宪法和开设议会而奋斗，晚年写下《一年有半》面对死亡展现哲学家的从容。' },
  { name:'野口英世', birth:1876, death:1928, cat:'scientist', emoji:'🦠',
    desc:'野口英世（1876-1928），福岛县出身，日本近代最具国际声誉的细菌学家。他从贫苦农家子弟自学成才赴美研究，在洛克菲勒研究所发现了梅毒螺旋体和黄热病病原体。他在非洲研究黄热病时不幸感染以身殉职，遗言为我不畏惧死亡。他的肖像被印在一千日元纸币上，是日本人心中最敬仰的科学家之一。' },
  { name:'大正天皇', birth:1879, death:1926, cat:'emperor', emoji:'👑',
    desc:'大正天皇（1879-1926），名嘉仁，日本第一百二十三代天皇。他在位期间被称为大正民主时代，政党政治兴起，言论自由和民主运动空前活跃。他自幼体弱多病，执政后期由皇太子裕仁摄政。大正时代虽然短暂却是日本近代史上最开放民主的时期，与前后两个时代的军国主义形成鲜明对比。' },
  { name:'井上馨', birth:1836, death:1915, cat:'politician', emoji:'🤝',
    desc:'井上馨（1836-1915），长州藩出身，明治维新元老和外交家。他早年参与倒幕运动，维新后历任大藏大辅和外务卿等职，主导日本与西方列强修订不平等条约的谈判。他倡导鹿鸣馆时代的欧化政策，建造西式社交场所鹿鸣馆招待外国使节，虽被批评为肤浅的欧化但推动了日本融入国际社会。' },
];

const WORLD_PERSONS = [
  { name:'拿破仑', birth:1769, death:1821, cat:'emperor', emoji:'🎖️',
    desc:'拿破仑·波拿巴（1769-1821），科西嘉岛出身，法兰西第一帝国创建者和皇帝。他以非凡的军事天才从炮兵少尉崛起为欧洲霸主，指挥奥斯特里茨等六十余场战役多数取得胜利。他颁布《拿破仑法典》奠定了现代大陆法系的基础，传播了法国大革命的自由平等理念。1815年滑铁卢战败后被流放至圣赫勒拿岛终老。' },
  { name:'林肯', birth:1809, death:1865, cat:'politician', emoji:'🏛️',

  { name:'马克思', birth:1818, death:1883, cat:'philosopher', emoji:'📕',
    desc:'卡尔·马克思（1818-1883），德国思想家、经济学家和革命家，科学社会主义和马克思主义的创始人。他与恩格斯合著的《共产党宣言》和毕生心血之作《资本论》深刻分析了资本主义生产方式的内在矛盾，提出了剩余价值学说和历史唯物主义。他的理论深刻影响了俄国革命、中国革命和全球社会主义运动。' },
  { name:'达尔文', birth:1809, death:1882, cat:'scientist', emoji:'🧬',

// ========== 朝代/时代色带 ==========
const CHINA_ERAS = [
  { name:'晚清', start:1800, end:1912, color:'#2c3e50' },
  { name:'民国', start:1912, end:1949, color:'#3498db' },
];
const JAPAN_ERAS = [
  { name:'江户', start:1800, end:1868, color:'#2a2a5a' },
  { name:'明治', start:1868, end:1912, color:'#c0392b' },
  { name:'大正', start:1912, end:1926, color:'#8e44ad' },
  { name:'昭和', start:1926, end:1949, color:'#2980b9' },
];
const WORLD_ERAS = [
  { name:'拿破仑时代', start:1800, end:1815, color:'#8B0000' },
  { name:'殖民帝国', start:1815, end:1914, color:'#2c3e50' },
  { name:'世界大战', start:1914, end:1945, color:'#7f8c8d' },
  { name:'战后初期', start:1945, end:1949, color:'#34495e' },
];

// ========== RENDERING ==========
const BLOCKS = [
  { id:'china', persons:CHINA_PERSONS, onlyEvents:CHINA_ONLY, eras:CHINA_ERAS },
  { id:'japan', persons:JAPAN_PERSONS, onlyEvents:JAPAN_ONLY, eras:JAPAN_ERAS },
  { id:'world', persons:WORLD_PERSONS, onlyEvents:WORLD_ONLY, eras:WORLD_ERAS },
];

const axisInfo = {};

function renderBlock(block, blockIdx) {
  const contentEl = document.getElementById(block.id + 'Content');
  if (!contentEl) return;
  contentEl.innerHTML = '';
  const w = totalW();
  contentEl.style.width = w + 'px';

  // ---- 统一"插空"系统：事件+人物共享纵向空间 ----
  // 先收集所有事件的 x 区间，按纵向层分类
  // 纵向层：above0(最靠近轴), above1, above2... / below0, below1, below2...
  const laneH = 18;
  const laneKeys = []; // 'a0','b0','a1','b1','a2','b2'... 交替上下
  for (let i = 0; i < 20; i++) { laneKeys.push((i%2===0?'a':'b') + Math.floor(i/2)); }
  // 每条 lane 的已占区间
  const laneIntervals = {};
  laneKeys.forEach(k => laneIntervals[k] = []);

  function overlaps(intervals, x1, x2) {
    for (const iv of intervals) { if (!(x2 < iv.x1 || x1 > iv.x2)) return true; }
    return false;
  }
  function findLane(x1, x2) {
    for (const k of laneKeys) {
      if (!overlaps(laneIntervals[k], x1, x2)) {
        laneIntervals[k].push({x1, x2});
        return k;
      }
    }
    // 全满则追加
    const lastK = laneKeys[laneKeys.length-1];
    const newIdx = parseInt(lastK.slice(1)) + 1;
    const newK = (laneKeys.length % 2 === 0 ? 'a' : 'b') + newIdx;
    laneKeys.push(newK);
    laneIntervals[newK] = [{x1, x2}];
    return newK;
  }

  // 收集所有事件（关联+独立），按年份排序
  const allEvents = [];
  LINKED_EVENTS.forEach(ev => {
    const text = ev[block.id === 'china' ? 'china' : block.id === 'japan' ? 'japan' : 'world'];
    if (text) allEvents.push({year: ev.year, name: ev.name, type: ev.type, linked: true, ev});
  });
  block.onlyEvents.forEach(ev => {
    allEvents.push({year: ev.year, name: ev.name, type: ev.type, linked: false, ev});
  });
  allEvents.sort((a,b) => a.year - b.year);

  // 为事件分配 lane（事件优先占位）
  const eventSlots = [];
  allEvents.forEach(item => {
    const ex = x(item.year);
    const nameLen = item.name.length * 8 + 20;
    const pad = 10;
    const x1 = ex - pad, x2 = ex + nameLen + pad;
    const lane = findLane(x1, x2);
    const above = lane[0] === 'a';
    const level = parseInt(lane.slice(1));
    eventSlots.push({...item, lane, above, level, ex});
  });

  // 为人物分配 lane（人物填空隙）
  // 人物条长度 = 出生到去世的寿命跨度（与主页面一致）
  // 1800年前出生的人物：条从时间轴左边界开始，左侧加←标记
  const sorted = [...block.persons].sort((a,b) => a.birth - b.birth);
  const personSlots = [];
  sorted.forEach(p => {
    const deathYear = p.death || YE;
    // 条的可见起止：clamp到时间轴范围
    const visBirth = Math.max(p.birth, YS);
    const barStartX = x(visBirth);
    const barEndX = x(deathYear);
    const lifeBarW = Math.max(barEndX - barStartX, 0);
    // 碰撞检测区间：覆盖条+名字区域
    const nameW = p.name.length * 9 + 24;
    const pad = 4;
    const collisionX1 = barStartX - pad;
    const collisionX2 = barStartX + Math.max(lifeBarW, nameW) + pad;
    const lane = findLane(collisionX1, collisionX2);
    const above = lane[0] === 'a';
    const level = parseInt(lane.slice(1));
    const earlyBirth = p.birth < YS;
    personSlots.push({p, barStartX, lifeBarW, above, level, earlyBirth, deathYear});
  });

  // 计算布局
  let maxAbove = 0, maxBelow = 0;
  [...eventSlots, ...personSlots].forEach(s => {
    if (s.above) maxAbove = Math.max(maxAbove, s.level);
    else maxBelow = Math.max(maxBelow, s.level);
  });
  const axisY = Math.max((maxAbove + 1) * laneH + 14, 70);
  const contentH = axisY + (maxBelow + 1) * laneH + 30;
  contentEl.style.minHeight = contentH + 'px';

  const nodeMap = {};
  axisInfo[block.id] = { axisY, topY: 0, bottomY: contentH, nodeMap };

  block.eras.forEach(era => {
    const x1 = x(era.start), x2 = x(era.end);
    const band = document.createElement('div');
    band.className = 'dynasty-band';
    band.style.cssText = 'left:'+x1+'px;width:'+Math.max(x2-x1,2)+'px;background:'+era.color;
    contentEl.appendChild(band);
    if (x2 - x1 > 80) {
      const label = document.createElement('div');
      label.className = 'dynasty-label';
      label.style.left = (x1+(x2-x1)/2)+'px';
      label.textContent = era.name;
      contentEl.appendChild(label);
    }
  });

  const axis = document.createElement('div');
  axis.className = 'axis-line';
  axis.style.top = axisY + 'px';
  axis.style.width = w + 'px';
  contentEl.appendChild(axis);

  const step = pxPerYear < 1 ? 100 : pxPerYear < 2 ? 50 : 25;
  for (let y = Math.ceil(YS/step)*step; y <= YE; y += step) {
    const major = y % (step*4) === 0;
    const tick = document.createElement('div');
    tick.className = 'tick';
    tick.style.left = x(y) + 'px';
    tick.style.top = (axisY - (major?10:5)) + 'px';
    tick.innerHTML = '<div class="tick-line" style="height:'+(major?18:10)+'px"></div>' + (major ? '<div class="tick-label">'+y+'</div>' : '');
    contentEl.appendChild(tick);
  }

  // 渲染事件节点（统一用 lane 定位）
  eventSlots.forEach(slot => {
    const {ev, linked, above, level, ex} = slot;
    const col = EVT_COLORS[ev.type] || '#888';
    const dotY = above ? axisY - (level+1)*laneH : axisY + level*laneH + 4;
    const node = document.createElement('div');
    node.className = 'event-node' + (linked ? ' linked' : '');
    if (linked) { node.dataset.eventId = ev.id; node.dataset.block = block.id; }
    node.style.left = ex + 'px';
    node.style.top = dotY + 'px';
    node.style.color = col;
    node.innerHTML = (above ?
      '<div class="event-label" style="margin-bottom:2px">'+ev.name+'</div><div class="event-dot" style="border-color:'+col+'"></div>' :
      '<div class="event-dot" style="border-color:'+col+'"></div><div class="event-label" style="margin-top:2px">'+ev.name+'</div>');
    if (linked) {
      node.addEventListener('mouseenter', () => highlightLinked(ev.id));
      node.addEventListener('mouseleave', () => clearHighlight());
      node.addEventListener('click', function(e) { e.stopPropagation(); showLinkedEventDetail(ev); });
      nodeMap[ev.id] = { y: dotY + 5, el: node };
    } else {
      node.addEventListener('click', function(e) { e.stopPropagation(); showOnlyEventDetail(ev); });
    }
    contentEl.appendChild(node);
  });

  // 渲染人物：寿命条 + 名字标签
  personSlots.forEach(slot => {
    const {p, barStartX, lifeBarW, above, level, earlyBirth, deathYear} = slot;
    const col = CAT_COLORS[p.cat] || '#888';
    const topY = above ? axisY - (level+1)*laneH : axisY + level*laneH + 4;
    const el = document.createElement('div');
    el.className = 'person-row';
    el.style.left = barStartX + 'px';
    el.style.top = topY + 'px';
    el.style.overflow = 'visible';
    const prefix = earlyBirth ? '←' : '';
    const lifespan = deathYear - p.birth;
    const yearStr = p.birth + (p.death ? '-'+p.death : '');
    // 寿命条：宽度 = 出生到去世的像素跨度
    if (lifeBarW >= 3) {
      el.innerHTML = '<div class="person-name-bar" style="width:'+lifeBarW+'px;background:'+col+';position:relative">'
        + '<span style="position:absolute;left:0;top:0;bottom:0;padding:1px 5px;white-space:nowrap;font-size:11px;color:#fff;z-index:2">'+prefix+p.emoji+' '+p.name+'</span>'
        + '<span style="position:absolute;right:3px;top:0;bottom:0;font-size:8px;opacity:0.5;line-height:18px;color:#fff">'+yearStr+'</span>'
        + '</div>'
        + '<div class="person-delete" data-name="'+p.name+'" data-axis="'+block.id+'">×</div>';
    } else {
      // 寿命太短无法显示条，只用名字
      el.innerHTML = '<span class="person-emoji">'+p.emoji+'</span><span class="person-name" style="border-left:2px solid '+col+';padding-left:3px">'+prefix+p.name+'</span><div class="person-delete" data-name="'+p.name+'" data-axis="'+block.id+'">×</div>';
    }
    el.addEventListener('click', function(ev) {
      if (ev.target.classList.contains('person-delete')) return;
      ev.stopPropagation();
      showPersonDetail(p);
    });
    contentEl.appendChild(el);
  });
}

// ========== 详情面板 ==========
const EVT_TYPE_NAMES = { war:'战争', politics:'政治', culture:'文化', economy:'经济', science:'科技' };
const CAT_NAMES = { emperor:'帝王', military:'军事家', scholar:'学者', philosopher:'思想家', scientist:'科学家', artist:'艺术家', politician:'政治家', sage:'伟人', general:'将领', inventor:'发明家' };

function showPersonDetail(p) {
  const col = CAT_COLORS[p.cat] || '#888';
  const catName = CAT_NAMES[p.cat] || p.cat;
  const lifespan = p.death ? (p.death - p.birth) : (new Date().getFullYear() - p.birth);
  let html = '<div class="dp-emoji">'+p.emoji+'</div>';
  html += '<div class="dp-name">'+p.name+'</div>';
  html += '<div class="dp-years"><span class="lifespan-tag">'+p.birth+' — '+(p.death||'至今')+'</span></div>';
  html += '<div class="dp-lifespan"><span class="ls-label">享年</span><span class="ls-value">'+lifespan+'</span><span class="ls-unit">岁</span></div>';
  html += '<div class="dp-cat"><span class="dp-cat-tag" style="background:'+col+'">'+catName+'</span></div>';
  html += '<div class="dp-desc">'+(p.desc||'暂无简介')+'</div>';
  const relatedEvents = [];
  const allEvents = [...LINKED_EVENTS, ...CHINA_ONLY, ...JAPAN_ONLY, ...WORLD_ONLY];
  allEvents.forEach(ev => {
    if (ev.year >= p.birth && ev.year <= (p.death || YE)) {
      const txt = ev.china || ev.japan || ev.world || ev.desc || '';
      relatedEvents.push({ name: ev.name, year: ev.year, desc: txt, type: ev.type });
    }
  });
  if (relatedEvents.length > 0) {
    html += '<div class="dp-section"><div class="dp-section-title">同时期事件</div>';
    relatedEvents.slice(0, 10).forEach(ev => {
      const ec = EVT_COLORS[ev.type] || '#888';
      html += '<div class="dp-perspective" style="border-left-color:'+ec+'">';
      html += '<div class="dp-perspective-text"><span class="dp-type-tag" style="background:'+ec+'">'+ev.year+'</span> '+ev.name+'</div>';
      html += '<div class="dp-perspective-text" style="margin-top:4px;color:#8b949e">'+ev.desc+'</div>';
      html += '</div>';
    });
    html += '</div>';
  }
  document.getElementById('dpContent').innerHTML = html;
  document.getElementById('detailPanel').classList.add('show');
  document.getElementById('overlay').classList.add('show');
}

function showLinkedEventDetail(ev) {
  const col = EVT_COLORS[ev.type] || '#888';
  const typeName = EVT_TYPE_NAMES[ev.type] || ev.type;
  let html = '<div class="dp-emoji" style="font-size:32px">📅</div>';
  html += '<div class="dp-name">'+ev.name+'</div>';
  html += '<div class="dp-years"><span class="lifespan-tag">'+ev.year+'年</span> <span class="dp-type-tag" style="background:'+col+';vertical-align:middle;margin-left:8px">'+typeName+'</span></div>';
  html += '<div class="dp-section"><div class="dp-section-title">关联视角</div>';
  [{ key:'china', label:'📜 中国', cls:'china' },{ key:'japan', label:'🏯 日本', cls:'japan' },{ key:'world', label:'🌍 世界', cls:'world' }].forEach(p => {
    const text = ev[p.key]; if (!text) return;
    html += '<div class="dp-perspective '+p.cls+'"><div class="dp-perspective-label">'+p.label+'</div><div class="dp-perspective-text">'+text+'</div></div>';
  });
  html += '</div>';
  const relatedPersons = [];
  [...CHINA_PERSONS, ...JAPAN_PERSONS, ...WORLD_PERSONS].forEach(p => {
    if (ev.year >= p.birth && ev.year <= (p.death || YE)) {
      const catName = CAT_NAMES[p.cat] || '';
      relatedPersons.push(p.emoji + ' ' + p.name + ' <span style="color:#5a6a7e;font-size:11px">'+p.birth+'-'+(p.death||'')+' '+catName+'</span>');
    }
  });
  if (relatedPersons.length > 0) {
    html += '<div class="dp-section"><div class="dp-section-title">同时期人物</div>';
    html += '<div class="dp-desc" style="line-height:2">'+relatedPersons.slice(0, 8).join('<br>')+'</div></div>';
  }
  document.getElementById('dpContent').innerHTML = html;
  document.getElementById('detailPanel').classList.add('show');
  document.getElementById('overlay').classList.add('show');
}

function showOnlyEventDetail(ev) {
  const col = EVT_COLORS[ev.type] || '#888';
  const typeName = EVT_TYPE_NAMES[ev.type] || ev.type;
  let html = '<div class="dp-emoji" style="font-size:32px">📅</div>';
  html += '<div class="dp-name">'+ev.name+'</div>';
  html += '<div class="dp-years"><span class="lifespan-tag">'+ev.year+'年</span> <span class="dp-type-tag" style="background:'+col+';vertical-align:middle;margin-left:8px">'+typeName+'</span></div>';
  html += '<div class="dp-desc">'+(ev.desc||'暂无描述')+'</div>';
  document.getElementById('dpContent').innerHTML = html;
  document.getElementById('detailPanel').classList.add('show');
  document.getElementById('overlay').classList.add('show');
}

function hideDetail() {
  document.getElementById('detailPanel').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

document.getElementById('dpClose').addEventListener('click', hideDetail);
document.getElementById('overlay').addEventListener('click', hideDetail);
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideDetail(); });

function highlightLinked(eventId) {
  document.querySelectorAll('.event-node.linked.highlighted').forEach(el => el.classList.remove('highlighted'));
  document.querySelectorAll('#svgLinks line.highlighted').forEach(el => el.classList.remove('highlighted'));
  document.querySelectorAll('.event-node.linked[data-event-id="'+eventId+'"]').forEach(el => el.classList.add('highlighted'));
  document.querySelectorAll('#svgLinks line[data-event-id="'+eventId+'"]').forEach(el => el.classList.add('highlighted'));
}

function clearHighlight() {
  document.querySelectorAll('.event-node.linked.highlighted').forEach(el => el.classList.remove('highlighted'));
  document.querySelectorAll('#svgLinks line.highlighted').forEach(el => el.classList.remove('highlighted'));
}

// ========== SVG 连线 ==========
function renderLinks() {
  const svg = document.getElementById('svgLinks');
  if (!svg) return;
  const container = document.getElementById('timelineContainer');
  const containerRect = container.getBoundingClientRect();
  svg.setAttribute('width', totalW());
  svg.setAttribute('height', containerRect.height);
  svg.style.width = totalW() + 'px';
  svg.style.height = containerRect.height + 'px';
  svg.style.position = 'absolute';
  svg.style.top = '0';
  svg.style.left = '0';
  let lines = '';
  LINKED_EVENTS.forEach(ev => {
    const points = [];
    ['china','japan','world'].forEach(blockId => {
      const info = axisInfo[blockId]; if (!info) return;
      const text = ev[blockId]; if (!text) return;
      const blockEl = document.getElementById(blockId + 'Block'); if (!blockEl) return;
      const headerH = blockEl.querySelector('.block-header').offsetHeight;
      const offsetY = blockEl.offsetTop + headerH;
      const nodeData = info.nodeMap[ev.id];
      if (nodeData) points.push({ x: x(ev.year), y: offsetY + nodeData.y });
    });
    if (points.length >= 2) {
      const col = EVT_COLORS[ev.type] || '#888';
      for (let i = 0; i < points.length - 1; i++) {
        lines += '<line data-event-id="'+ev.id+'" x1="'+points[i].x+'" y1="'+points[i].y+'" x2="'+points[i+1].x+'" y2="'+points[i+1].y+'" stroke="'+col+'"/>';
      }
    }
  });
  svg.innerHTML = lines;
}

// ========== 统计 ==========
function updateStats() {
  const cs = CHINA_PERSONS.length + LINKED_EVENTS.filter(e=>e.china).length + CHINA_ONLY.length;
  const js = JAPAN_PERSONS.length + LINKED_EVENTS.filter(e=>e.japan).length + JAPAN_ONLY.length;
  const ws = WORLD_PERSONS.length + LINKED_EVENTS.filter(e=>e.world).length + WORLD_ONLY.length;
  const el1 = document.getElementById('chinaStats');
  const el2 = document.getElementById('japanStats');
  const el3 = document.getElementById('worldStats');
  if(el1) el1.textContent = cs + '人物·事件';
  if(el2) el2.textContent = js + '人物·事件';
  if(el3) el3.textContent = ws + '人物·事件';
}

// ========== 初始化 ==========
function renderAll(preserveScroll) {
  const mc = document.getElementById('mainContainer');
  let savedSL = 0, savedST = 0;
  if (preserveScroll && mc) { savedSL = mc.scrollLeft; savedST = mc.scrollTop; }

  const w = totalW();
  const container = document.getElementById('timelineContainer');
  if (container) container.style.width = w + 'px';

  BLOCKS.forEach((block, idx) => renderBlock(block, idx));
  updateStats();
  requestAnimationFrame(() => requestAnimationFrame(renderLinks));

  if (preserveScroll && mc) { mc.scrollLeft = savedSL; mc.scrollTop = savedST; }
}

// ========== 垂直分隔条拖拽 ==========
(function() {
  const resizer1 = document.getElementById('resizer1');
  const resizer2 = document.getElementById('resizer2');
  const chinaBlock = document.getElementById('chinaBlock');
  const japanBlock = document.getElementById('japanBlock');
  const worldBlock = document.getElementById('worldBlock');

  function initResize(resizer, prevBlock, nextBlock) {
    if (!resizer || !prevBlock || !nextBlock) return;
    let startY = 0, startPrevH = 0, startNextH = 0, isActive = false;
    resizer.addEventListener('mousedown', function(e) {
      if (e.button !== 0) return;
      e.preventDefault(); e.stopPropagation();
      isActive = true; resizer.classList.add('active');
      startY = e.pageY; startPrevH = prevBlock.offsetHeight; startNextH = nextBlock.offsetHeight;
      document.body.style.cursor = 'ns-resize'; document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', function(e) {
      if (!isActive) return;
      const dy = e.pageY - startY;
      prevBlock.style.flex = 'none'; prevBlock.style.height = Math.max(100, startPrevH + dy) + 'px';
      nextBlock.style.flex = 'none'; nextBlock.style.height = Math.max(100, startNextH - dy) + 'px';
      requestAnimationFrame(renderLinks);
    });
    document.addEventListener('mouseup', function() {
      if (!isActive) return;
      isActive = false; resizer.classList.remove('active');
      document.body.style.cursor = ''; document.body.style.userSelect = '';
      requestAnimationFrame(() => renderLinks());
    });
  }
  initResize(resizer1, chinaBlock, japanBlock);
  initResize(resizer2, japanBlock, worldBlock);
})();

// ========== 拖拽平移（核心修复）==========
(function() {
  const mc = document.getElementById('mainContainer');
  if (!mc) return;
  let isDown = false, hasMoved = false, startX, scrollLeft, startY, scrollTop;

  mc.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    // 不拦截按钮、分隔条、删除按钮
    if (e.target.closest('.resizer') || e.target.closest('button') || e.target.closest('.person-delete')) return;
    isDown = true; hasMoved = false;
    startX = e.clientX; scrollLeft = mc.scrollLeft;
    startY = e.clientY; scrollTop = mc.scrollTop;
    e.preventDefault(); // 防止文本选择
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDown) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (!hasMoved && Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
    if (!hasMoved) { hasMoved = true; mc.classList.add('grabbing'); }
    mc.scrollLeft = scrollLeft - dx;
    mc.scrollTop = scrollTop - dy;
  });

  document.addEventListener('mouseup', function() {
    if (!isDown) return;
    isDown = false;
    mc.classList.remove('grabbing');
  });

  // 如果发生了拖拽，阻止后续 click 事件冒泡
  mc.addEventListener('click', function(e) {
    if (hasMoved) { e.stopImmediatePropagation(); e.preventDefault(); hasMoved = false; }
  }, true);
})();

// ========== 缩放（以鼠标位置为中心，核心修复）==========
document.getElementById('mainContainer').addEventListener('wheel', function(e) {
  e.preventDefault();
  const mc = this;
  const rect = mc.getBoundingClientRect();
  // 鼠标在可视区域中的位置
  const viewX = e.clientX - rect.left;
  // 鼠标指向的内容年份
  const targetYear = YS + (viewX + mc.scrollLeft) / pxPerYear;
  // 调整缩放
  const factor = e.deltaY > 0 ? 0.85 : 1.18;
  const newPxPerYear = Math.max(0.8, Math.min(40, pxPerYear * factor));
  pxPerYear = newPxPerYear;
  // 先计算目标scrollLeft再渲染，避免renderAll重置位置
  const targetScrollLeft = Math.max(0, (targetYear - YS) * pxPerYear - viewX);
  renderAll(false);
  mc.scrollLeft = targetScrollLeft;
}, { passive: false });

// ========== 折叠 ==========
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.btn-collapse');
  if (!btn) return;
  const block = document.getElementById(btn.dataset.block);
  if (!block) return;
  block.classList.toggle('collapsed');
  btn.textContent = block.classList.contains('collapsed') ? '▼' : '▲';
  setTimeout(renderLinks, 350);
});

// ========== 删除人物 ==========
document.addEventListener('click', function(e) {
  const del = e.target.closest('.person-delete');
  if (!del) return;
  e.stopPropagation(); e.preventDefault();
  const name = del.dataset.name;
  const axis = del.dataset.axis;
  if (!confirm('确定删除人物「'+name+'」？')) return;
  const arrMap = { china: CHINA_PERSONS, japan: JAPAN_PERSONS, world: WORLD_PERSONS };
  const arr = arrMap[axis];
  if (!arr) return;
  const idx = arr.findIndex(p => p.name === name);
  if (idx >= 0) { arr.splice(idx, 1); renderAll(true); }
});

// ========== 添加人物 ==========
document.getElementById('btnAddPerson').addEventListener('click', function() {
  document.getElementById('addPersonModal').classList.add('show');
});
document.getElementById('addCancel').addEventListener('click', function() {
  document.getElementById('addPersonModal').classList.remove('show');
});
document.getElementById('addSubmit').addEventListener('click', function() {
  const axis = document.getElementById('addAxis').value;
  const name = document.getElementById('addName').value.trim();
  const birth = parseInt(document.getElementById('addBirth').value);
  const deathVal = document.getElementById('addDeath').value.trim();
  const death = deathVal ? parseInt(deathVal) : null;
  const cat = document.getElementById('addCat').value;
  const emoji = document.getElementById('addEmoji').value.trim() || '👤';
  const desc = document.getElementById('addDesc').value.trim();

  if (!name) { alert('请输入姓名'); return; }
  if (!birth || birth < 1700 || birth > 1949) { alert('出生年份需在1700-1949之间'); return; }
  if (death && death <= birth) { alert('逝世年份需大于出生年份'); return; }
  if (desc.length < 20) { alert('简介至少20字'); return; }

  const arrMap = { china: CHINA_PERSONS, japan: JAPAN_PERSONS, world: WORLD_PERSONS };
  arrMap[axis].push({ name, birth, death, cat, emoji, desc });

  document.getElementById('addPersonModal').classList.remove('show');
  // 清空表单
  ['addName','addBirth','addDeath','addEmoji','addDesc'].forEach(id => document.getElementById(id).value = '');
  renderAll(true);
});

// ========== 窗口 resize ==========
window.addEventListener('resize', function() { clearTimeout(window._rsz); window._rsz = setTimeout(function() { renderAll(true); }, 200); });

// ========== 启动 ==========
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() { setTimeout(renderAll, 100); });
} else {
  setTimeout(renderAll, 100);
}
</script>
